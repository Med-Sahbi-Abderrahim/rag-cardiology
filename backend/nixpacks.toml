[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --no-cache-dir --find-links https://download.pytorch.org/whl/cpu -r requirements.txt"
]

[phases.build]
cmds = [
  # Pre-download the sentence-transformers model so it's baked into the image
  # and not re-downloaded on every cold start.
  ". /opt/venv/bin/activate && python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('intfloat/multilingual-e5-base')\""
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
