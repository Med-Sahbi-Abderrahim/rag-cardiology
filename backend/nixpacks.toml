[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"
]

# Disable default extra build-time pip install
[phases.build]
cmds = ["echo Build phase skipped"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"